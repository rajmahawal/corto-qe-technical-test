name: API Pipeline

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  api-tests:
    name: Lint, typecheck and API tests
    runs-on: ubuntu-latest

    env:
      API_BASE_URL: https://restful-booker.herokuapp.com

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check API health
        run: |
          status_code=$(
            curl -s -o /dev/null -w "%{http_code}" "$API_BASE_URL/ping"
          )

          echo "Health check status code: $status_code"

          if [ "$status_code" -ne 200 ] && [ "$status_code" -ne 201 ]; then
            echo "Restful Booker API health check failed with status: $status_code"
            exit 1
          fi

      - name: Run lint
        run: npm run lint

      - name: Run typecheck
        run: npm run typecheck

      - name: Run API tests
        run: npm run test:api

      - name: Upload Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-playwright-artifacts
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore
